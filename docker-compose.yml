services:
  api:
    build:
      context: ./url_shortner
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/url_shortener
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - BASE_URL=http://localhost:5000
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production-32ch}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-production-32}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - RATE_LIMIT_REDIRECT_MAX=100
      - RATE_LIMIT_REDIRECT_WINDOW_SECONDS=60
      - RATE_LIMIT_CREATE_MAX=20
      - RATE_LIMIT_CREATE_WINDOW_SECONDS=60
      - CACHE_TTL_SECONDS=300
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
